<script>
function checkIn() {
    let name = document.getElementById("name").value;
    let location = document.getElementById("location").value;

    if (!name || !location) {
        alert("Please enter all fields");
        return;
    }

    let data = JSON.parse(localStorage.getItem("attendance")) || [];

    data.push({
        guardName: name,
        checkInTime: new Date().toISOString(),
        checkOutTime: null,
        location: location,
        totalHours: 0
    });

    localStorage.setItem("attendance", JSON.stringify(data));

    alert("Check-in successful (Demo Mode)");
}

function checkOut() {
    let name = document.getElementById("name").value;

    let data = JSON.parse(localStorage.getItem("attendance")) || [];

    for (let i = data.length - 1; i >= 0; i--) {
        if (data[i].guardName === name && !data[i].checkOutTime) {
            data[i].checkOutTime = new Date().toISOString();

            let start = new Date(data[i].checkInTime);
            let end = new Date(data[i].checkOutTime);

            data[i].totalHours = ((end - start) / (1000 * 60 * 60)).toFixed(2);
            break;
        }
    }

    localStorage.setItem("attendance", JSON.stringify(data));

    alert("Check-out successful (Demo Mode)");
}
</script>
