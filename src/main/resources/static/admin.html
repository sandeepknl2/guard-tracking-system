<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

table {
    margin: 30px auto;
    border-collapse: collapse;
    width: 90%;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
}

th {
    background: #007bff;
    color: white;
}
</style>
</head>

<body>

<h2>Attendance Dashboard</h2>

<table id="table"></table>

<script>
function loadData() {
    fetch("http://localhost:8080/api/logs")
    .then(res => res.json())
    .then(data => {

        let table = "<tr><th>Name</th><th>Check-In</th><th>Check-Out</th><th>Location</th><th>Hours</th></tr>";

        data.forEach(e => {
            table += `<tr>
                <td>${e.guardName}</td>
                <td>${e.checkInTime}</td>
                <td>${e.checkOutTime || '-'}</td>
                <td>${e.location}</td>
                <td>${e.totalHours}</td>
            </tr>`;
        });

        document.getElementById("table").innerHTML = table;
    });
}

loadData();

// 🔥 Auto refresh every 5 sec (BONUS FEATURE)
setInterval(loadData, 5000);
</script>

</body>
</html>
