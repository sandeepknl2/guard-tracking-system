<script>
function loadData() {
    let data = JSON.parse(localStorage.getItem("attendance")) || [];

    let table = "<tr><th>Name</th><th>Check-In</th><th>Check-Out</th><th>Location</th><th>Hours</th></tr>";

    data.forEach(e => {
        table += `<tr>
            <td>${e.guardName}</td>
            <td>${e.checkInTime}</td>
            <td>${e.checkOutTime || '-'}</td>
            <td>${e.location}</td>
            <td>${e.totalHours}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = table;
}

loadData();
</script>
